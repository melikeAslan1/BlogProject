# Adım 1: Geliştirme ortamında Elasticsearch.
# Çalıştır: proje kökünde `docker compose up -d`
# Açıklama: "index" verisi burada tutulur; PostgreSQL asıl kayıt için kalır.
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    container_name: blogproject-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data

  redis:
    image: redis:7-alpine
    container_name: blogproject-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  es-data:
  redis-data:
